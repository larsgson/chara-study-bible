# Netlify config for chara-study-bible
#
# Frontend is fully-static (Astro SSG). No adapter, no Functions, no SSR.
# Set the runtime env vars in the Netlify dashboard:
#   PUBLIC_API_BASE_URL  — backend origin for lib/api/* (required for API features)
#   PUBLIC_API_PASSWORD  — Bearer token for /ask + ?semantic=true (required for RAG)
# Without those, the local BSB reader still works; API features fail gracefully.

[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # Node 22 for Astro 6; pnpm version comes from packageManager in package.json.
  NODE_VERSION = "22"
  # Backend origin baked into the JS bundle at build time. Public anyway, so
  # checking it in is fine. Override per-deploy via Netlify env vars if needed.
  PUBLIC_API_BASE_URL = "https://bt-docker-mcp-production.up.railway.app"

# Path-style verse permalinks → query-string form (301 at the edge, no
# compute cost). Preserves shareable / bookmarked URLs of the form
#   /bible/jhn/3/16  →  /bible/jhn/3?v=16
# The chapter page reads `?v=` on mount and enters focus mode for that verse.
[[redirects]]
  from = "/bible/:book/:chapter/:verse"
  to = "/bible/:book/:chapter?v=:verse"
  status = 301

# Chunk permalinks: /c/<chunk_id> → served by /c/index.html, which reads the
# chunk_id from window.location.pathname and fetches /api/chunk/<id>.
# Status 200 (rewrite) keeps the URL bar showing /c/<id> for shareability.
[[redirects]]
  from = "/c/*"
  to = "/c/index.html"
  status = 200

# Tree-view paths: /en/<tree>/<...> → served by /en/index.html, which parses
# the path and fetches /api/tree/<tree>/<...>.
[[redirects]]
  from = "/en/*"
  to = "/en/index.html"
  status = 200

# Catch-all for unimplemented routes (API-backed features that aren't wired
# yet, e.g. /topic/..., /entity/..., /concordance/...). The 404 page explains
# which features are live and which are pending.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
